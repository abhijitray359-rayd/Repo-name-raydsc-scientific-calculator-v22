name: Build RAYDSC APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Unzip RAYDSC project
        run: |
          unzip RAYDSC_v22_source.zip -d extracted
          find extracted -maxdepth 5 -type f | sort

      - name: Build APK
        run: |
          PROJECT_DIR=$(find extracted -name "settings.gradle.kts" -exec dirname {} \; | head -n 1)
          echo "Project directory: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: raydsc-debug-apk
          path: extracted/**/app/build/outputs/apk/debug/*.apk
